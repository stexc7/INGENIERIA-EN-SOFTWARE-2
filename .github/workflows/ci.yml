name: CI/CD - Salud Familiar PWA

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    name: Pruebas unitarias y cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Ejecutar tests con cobertura
        run: npm test -- --coverage

  build:
    name: Build de producción
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Compilar aplicación
        run: npm run build
      - name: Guardar build
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/

  e2e:
    name: Pruebas E2E con Cypress
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Ejecutar Cypress
        uses: cypress-io/github-action@v6
        with:
          build: npm run build
          start: npm run preview
          wait-on: 'http://localhost:4173'
        env:
          CYPRESS_BASE_URL: http://localhost:4173

  deploy:
    name: Despliegue a producción
    needs: [test, build, e2e]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Compilar
        run: npm run build
      - name: Notificar despliegue
        run: echo "Build listo para desplegar en Vercel (auto-deploy configurado)"
