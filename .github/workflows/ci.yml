name: CI/CD - Salud Familiar PWA

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [develop, main]

jobs:
  backend-test:
    name: Backend - pruebas y cobertura
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Ejecutar tests con cobertura
        run: npm run test:coverage

  frontend-test:
    name: Frontend - pruebas y cobertura
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Ejecutar tests con cobertura
        run: npm run test:coverage

  build:
    name: Build de producción (frontend)
    needs: frontend-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Compilar aplicación
        run: npm run build
      - name: Guardar build
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: frontend/dist/

  e2e:
    name: Pruebas E2E (backend + frontend reales)
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Instalar dependencias del monorepo
        run: npm ci
      - name: Instalar dependencias de backend y frontend
        run: npm run install:all
      - name: Resetear base de datos, levantar backend + frontend y correr Cypress
        run: npm run e2e
      - name: Guardar capturas de fallos (si las hay)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots/
          if-no-files-found: ignore

  deploy:
    name: Despliegue a producción
    needs: [backend-test, frontend-test, build, e2e]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notificar despliegue
        run: |
          echo "Frontend listo para desplegar en Vercel (auto-deploy configurado sobre /frontend)."
          echo "Backend: se ejecuta localmente para la sustentación (SQLite + Express), no requiere despliegue en la nube."
